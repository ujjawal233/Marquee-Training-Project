<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .class{
            height: 500px;
            width: 400px;
            border: 2px solid black;
            display: flex;
            margin-left: 500px;
            margin-top: 50px;
            align-items: center;
            justify-content: center;

        }
        .container{
            height: 480px;
            width: 380px;
            border: 1px solid black;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            background-color: blue;
        }
        .sub1{
            height: 200px;
            width: 380px;
            border-radius: 30%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sub2{
            height: 300px;
            width: 380px;
            background-color: white;
            display: flex;
            
        }
        .profileimg{
            height: 150px;
            width: 150px;
            border-radius: 50%;
            border: 1px solid black;
        }
        .content{
            height: 50px;
            width: 70px;
            border: 1px solid black;
            flex-direction: column;
        }
        .content1{
            height: 30px;
            width: 50px;
            border: 1px solid black;

        }
        .content2{
            height: 30px;
            width: 50px;
            border: 1px solid black;
        }
        .logoes{
            height: 20px;
            width: 50px;
            border: 1px solid black;
            flex-direction: row;

        }
        .circle{
            height: 30px;
            width: 30px;
            border: 1px solid black;
        }
        .button{
            height: 50px;
            width: 100px;
            border: 1px solid black;
        }
        .bu{
            height: 20px;
            width: 50px;
            border: 1px solid black;
        }
        .score{
            height: 50px;
            width: 100px;
            border: 1px solid black;
        }
        .box{
            height: 20px;
            width: 40px;
            border: 1px solid black;
        }





    </style>
</head>
<body>
    <div class="class">
        <div class="container">
            <div class="sub1">
                <div class="profileimg"></div>
            </div>
            <div class="sub2">
                <div class="content">
                    <div class="content1">CodingLab</div>
                    <div class="content2">YouTuber & Blogger</div>
                </div>
                <div class="logoes">
                    <div class="facebook circle"></div>
                    <div class="twitter circle"></div>
                    <div class="insta circle"></div>
                    <div class="yt circle"></div>
                </div>
                <div class="button">
                    <div class="subscribe bu">Subscribe</div>
                    <div class="message bu">Message</div>
                </div>
                <div class="score">
                    <div class="like box"></div>
                    <div class="comment box"></div>
                    <div class="share box"></div>
            </div>
        </div>
    </div>
</body>
</html>
